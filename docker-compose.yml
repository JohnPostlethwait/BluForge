services:
  bluforge:
    build: .
    ports:
      - "9160:9160"
    volumes:
      - ./config:/config
      - ./output:/output
    devices:
      - /dev/sr0:/dev/sr0
      - /dev/sg0:/dev/sg0
    environment:
      - ACCEPT_EULA=yes           # Required: confirms acceptance of the MakeMKV EULA at https://www.makemkv.com/eula/
      - MAKEMKV_VERSION=1.18.3    # MakeMKV version to install. Tested: 1.18.3
      - BLUFORGE_AUTO_RIP=false
      - USER_ID=1000
      - GROUP_ID=1000
      - UMASK=0022
